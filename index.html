<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Suporte de Tela</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #painel { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(255, 255, 255, 0.95); padding: 20px; 
            border-radius: 12px; z-index: 10; width: 300px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        h2 { margin-top: 0; color: #2c3e50; font-size: 18px; border-bottom: 2px solid #3498db; padding-bottom: 8px; }
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #34495e; font-weight: bold; margin-bottom: 5px; }
        input[type="range"] { width: 100%; }
        span.val { float: right; color: #3498db; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="painel">
        <h2>Simulador de Suporte em L</h2>
        <div class="control-group">
            <label>Largura da Platibanda: <span id="lblPlatibanda" class="val">15 cm</span></label>
            <input type="range" id="larguraPlatibanda" min="10" max="50" step="1" value="15">
        </div>
        <div class="control-group">
            <label>Afastamento (Tubo L): <span id="lblHorizontal" class="val">1.75 m</span></label>
            <input type="range" id="comprimentoL" min="1.0" max="2.5" step="0.05" value="1.75">
        </div>
        <hr>
        <p style="font-size: 11px; color: #7f8c8d; line-height: 1.4;">
            * Tubo metálico: 60x60mm (Parede 3mm)<br>
            * Movimento horizontal do "V" ajusta o aperto na platibanda.
        </p>
    </div>

    <!-- Bibliotecas 3D necessárias -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="app.js"></script>
</body>
</html>
